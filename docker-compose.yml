services:
  app:
    build: .
    image: ecommerce-ai:latest
    container_name: ecommerce-ai
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GRADIO_SHARE=0
    volumes:
      - ./data:/app/data
      - hf_cache:/data/hf_cache
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7860/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 180s

volumes:
  hf_cache:
